apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    database: salt_damage
    editable: false
    jsonData:
      defaultDatabase: salt_damage
      username: default
      tlsSkipVerify: true
    secureJsonData:
      password: ""
