server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: rainflow-cycle-service
  datasource:
    url: jdbc:mysql://localhost:3306/salt_damage_biz?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
  clickhouse:
    url: jdbc:clickhouse://localhost:8123/salt_damage
    username: default
    password: ""
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
  data:
    redis:
      host: localhost
      port: 6379

rainflow:
  thread-pool:
    core-size: 4
    max-size: 8
    queue-capacity: 100

algorithm:
  rainflow:
    deliquescence-rh: 75.0
    sn-exponent: 3.0
    reference-cycles: 1000000

logging:
  level:
    com.saltdamage: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
