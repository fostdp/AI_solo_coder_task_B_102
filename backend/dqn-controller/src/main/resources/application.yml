server:
  port: 8082
  servlet:
    context-path: /api

spring:
  application:
    name: dqn-controller-service
  datasource:
    url: jdbc:mysql://localhost:3306/salt_damage_biz?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
  clickhouse:
    url: jdbc:ch://localhost:8123/salt_damage
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
  data:
    redis:
      host: localhost
      port: 6379

dqn:
  onnx-model-path: models/dqn_microclimate.onnx
  input-dim: 5
  output-dim: 4
  hidden1: 32
  hidden2: 16

algorithm:
  dqn:
    reward-safe: 1.0
    penalty-deliquescence: -5.0
    penalty-extreme: -10.0
    penalty-dehumidifier: -0.5
    penalty-humidifier: -0.5
    penalty-both: -1.5
    penalty-switch: -1.0
    action-persistence-bonus: 0.3

logging:
  level:
    com.saltdamage: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
