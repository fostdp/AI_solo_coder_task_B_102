server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: salt-damage-monitor

  datasource:
    mysql:
      jdbc-url: jdbc:mysql://localhost:3306/salt_damage_biz?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: ${DB_MYSQL_USERNAME:root}
      password: ${DB_MYSQL_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
    clickhouse:
      jdbc-url: jdbc:ch://localhost:8123/salt_damage?connect_timeout=30000&socket_timeout=300000
      username: ${DB_CLICKHOUSE_USERNAME:default}
      password: ${DB_CLICKHOUSE_PASSWORD:}
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      hikari:
        maximum-pool-size: 30
        minimum-idle: 10
        connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 告警配置
alarm:
  salt-threshold: 5.0
  humidity-threshold: 75.0
  humidity-duration: 48
  offline-duration: 4

# 钉钉配置
dingtalk:
  enabled: false
  app-key: ${DINGTALK_APP_KEY:}
  app-secret: ${DINGTALK_APP_SECRET:}
  webhook-url: ${DINGTALK_WEBHOOK_URL:}
  secret: ${DINGTALK_SIGN_SECRET:}

# WebSocket配置
websocket:
  endpoint: /ws
  allowed-origins: "*"
  heartbeat-interval: 30000

# 核心算法配置
algorithm:
  salt-migration:
    porosity: 0.35
    permeability: 1.0e-12
    viscosity: 0.001002
    diffusion-coeff: 1.33e-9
  crystallization:
    prediction-hours: 72
    risk-levels:
      low: 0.5
      medium: 1.0
      high: 2.0
      critical: 5.0

# 日志配置
logging:
  level:
    root: INFO
    com.saltdamage: DEBUG
  file:
    name: logs/salt-damage-monitor.log
    max-size: 50MB
    max-history: 30

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
